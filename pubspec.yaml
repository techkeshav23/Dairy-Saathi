name: my_order_pro
description: "MY ORDER PRO — B2B wholesale ordering app for kirana retailers. Powered by CodeBlimp."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management (rock-solid, version-safe)
  provider: ^6.1.2

  # Persistence
  shared_preferences: ^2.3.2

  # Formatting (currency, dates)
  intl: ^0.20.2

  # Networking-ready images with caching + graceful fallback
  cached_network_image: ^3.4.1

  # Home banner carousel
  carousel_slider: ^5.0.0

  # OTP input boxes
  pin_code_fields: ^8.0.1

  # Loading placeholders (skeletons)
  shimmer: ^3.0.0

  # Typography (Inter) — MY ORDER PRO design system
  google_fonts: ^6.2.1

  # Backend (Phase 4) — real data via Supabase
  supabase_flutter: ^2.5.6

  # Local offline persistence (SQLite) — used by party_service fallback
  sqflite: ^2.3.3
  path: ^1.9.0

  # Wave 1 — GST invoice/bill PDF generation + print + share
  pdf: ^3.11.1
  printing: ^5.13.1
  share_plus: ^10.1.0
  path_provider: ^2.1.4

  # Phase 7 — tap-to-WhatsApp / call payment reminders
  url_launcher: ^6.3.0
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Phase 7 — generate branded launcher icon + native splash from brand assets
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/products/
    - assets/brand/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/brand/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/brand/app_icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/brand/app_icon.png"
  android_12:
    color: "#FFFFFF"
    image: "assets/brand/app_icon.png"
