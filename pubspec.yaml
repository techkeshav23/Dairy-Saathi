name: saathi
description: "Saathi — B2B wholesale ordering app for retailers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management (rock-solid, version-safe)
  provider: ^6.1.2

  # Persistence
  shared_preferences: ^2.3.2

  # Formatting (currency, dates)
  intl: ^0.20.2

  # Networking-ready images with caching + graceful fallback
  cached_network_image: ^3.4.1

  # Home banner carousel
  carousel_slider: ^5.0.0

  # OTP input boxes
  pin_code_fields: ^8.0.1

  # Loading placeholders (skeletons)
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/products/
